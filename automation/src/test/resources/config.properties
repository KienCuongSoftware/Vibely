# Default browser for local automation. If Brave crashes with DevToolsActivePort,
# close all Brave windows or run: mvn test -Dbrowser=chrome
base.url=http://localhost:5173
browser=brave
headless=false
timeout=10
# Pause after each click/type (ms). Raise for easier watching; set 0 for full speed.
action.delay.ms=900
implicit.wait=0
window.width=1920
window.height=1080
brave.path=C:\\Program Files\\BraveSoftware\\Brave-Browser\\Application\\brave.exe
environment=Local
