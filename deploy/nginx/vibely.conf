# Vibely production — /etc/nginx/sites-available/vibely
# Requires map block in /etc/nginx/nginx.conf inside http { }:
#
#   map $http_upgrade $connection_upgrade {
#       default upgrade;
#       ''      close;
#   }
#
# Cloudflare terminates HTTPS; origin nginx listens on :80. Prefer client proto, else https:
#   map $http_x_forwarded_proto $vibely_forwarded_proto {
#       default $http_x_forwarded_proto;
#       ''      https;
#   }

server {
    listen 80;
    server_name vibely.sbs www.vibely.sbs;

    root /var/www/vibely;
    index index.html;

    # --- Backend proxy (MUST include /oauth2/ and /login/oauth2/ or Google/Facebook login breaks) ---

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Legacy SPA builds called /oauth2/... (no /api). Redirect to /api/oauth2/... so OAuth
    # starts with 302 to Google/Facebook instead of index.html → React → /foryou.
    location /oauth2/ {
        return 307 /api$request_uri;
    }

    location /login/oauth2/ {
        return 307 /api$request_uri;
    }

    location /share/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location = /robots.txt {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Exact match — avoids 301 /ws -> /ws/ (browsers do not follow WS redirects)
    location = /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Hashed Vite assets — never fall back to index.html (that causes MIME text/html on 404).
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback — keep last so /oauth2/, /api/, and /assets/ win
    location / {
        try_files $uri $uri/ /index.html;
    }
}
