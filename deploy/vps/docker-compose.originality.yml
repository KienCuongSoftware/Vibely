# Production add-on: Qdrant + originality worker.
# Place next to /opt/vibely/docker-compose.yml and vibely.env
# Usage:
#   cd /opt/vibely
#   docker compose -f docker-compose.originality.yml pull
#   docker compose -f docker-compose.originality.yml up -d

services:
  qdrant:
    image: qdrant/qdrant:v1.14.0
    container_name: vibely-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  originality-worker:
    image: kiencuongsoftware/vibely-originality-worker:latest
    container_name: vibely-originality-worker
    restart: unless-stopped
    depends_on:
      - qdrant
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - vibely.env
    environment:
      # Backend uses network_mode: host → API on host :8080
      VIBELY_API_BASE: http://host.docker.internal:8080
      # Compose substitutes from host/.env — empty ${VAR} overrides env_file and crash-loops the worker.
      ORIGINALITY_INTERNAL_TOKEN: ${APP_ORIGINALITY_INTERNAL_TOKEN:-vibely-dev-originality-token}
      QDRANT_URL: http://qdrant:6333
      QDRANT_ENABLED: "true"
      QDRANT_TIMEOUT_SECONDS: "5"
      ORIGINALITY_CLIP_MODEL: ViT-B-32
      ORIGINALITY_POLL_SECONDS: "3"
      # Fast pre-publish path: few CLIP frames, skip full OCR (watermark OCR stays on).
      ORIGINALITY_MAX_FRAMES: ${ORIGINALITY_MAX_FRAMES:-4}
      ORIGINALITY_OCR_ENABLED: ${ORIGINALITY_OCR_ENABLED:-false}
      ORIGINALITY_WATERMARK_ENABLED: ${ORIGINALITY_WATERMARK_ENABLED:-false}
      ORIGINALITY_WATERMARK_MAX_FRAMES: ${ORIGINALITY_WATERMARK_MAX_FRAMES:-2}
      ORIGINALITY_WARM_ON_START: "true"
    volumes:
      - originality_tmp:/tmp
      - originality_hf_cache:/root/.cache/huggingface

volumes:
  qdrant_data:
  originality_tmp:
  originality_hf_cache:
