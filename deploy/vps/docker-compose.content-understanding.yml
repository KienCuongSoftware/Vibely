# Content Understanding Phase 1 — RabbitMQ + CU worker
# Usage (next to docker-compose.yml + vibely.env):
#   docker compose -f docker-compose.content-understanding.yml up -d

services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: vibely-rabbitmq
    restart: unless-stopped
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-vibely}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-vibely}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  content-understanding-worker:
    image: kiencuongsoftware/vibely-cu-worker:latest
    build:
      context: ../../ai-workers/content-understanding
    container_name: vibely-cu-worker
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - vibely.env
    environment:
      VIBELY_API_BASE: http://host.docker.internal:8080
      # Compose substitutes from host/.env — keep default so empty host env cannot wipe token.
      CU_INTERNAL_TOKEN: ${APP_CU_INTERNAL_TOKEN:-vibely-dev-cu-token}
      CU_RABBITMQ_ENABLED: ${APP_CU_RABBITMQ_ENABLED:-true}
      RABBITMQ_URL: amqp://${RABBITMQ_USERNAME:-vibely}:${RABBITMQ_PASSWORD:-vibely}@rabbitmq:5672/%2F
      CU_QUEUE_ANALYZE: ${APP_CU_QUEUE_ANALYZE:-cu.analyze}
      CU_POLL_SECONDS: "3"
      CU_FRAMES_ENABLED: ${CU_FRAMES_ENABLED:-true}
      CU_OCR_ENABLED: ${CU_OCR_ENABLED:-true}
      CU_CLIP_ENABLED: ${CU_CLIP_ENABLED:-true}
      CU_WHISPER_ENABLED: ${CU_WHISPER_ENABLED:-true}
      CU_YOLO_ENABLED: ${CU_YOLO_ENABLED:-true}
      CU_QDRANT_ENABLED: ${CU_QDRANT_ENABLED:-true}
      CU_FRAME_COUNT: ${CU_FRAME_COUNT:-8}
      CU_YOLO_WEIGHTS: ${CU_YOLO_WEIGHTS:-yolov8n.pt}
      # Qdrant lives in originality compose (published on host :6333).
      # Default host.docker.internal — "qdrant" DNS only works if networks are joined.
      QDRANT_URL: ${QDRANT_URL:-http://host.docker.internal:6333}
      QDRANT_TIMEOUT_SECONDS: "5"
      CU_COMPLETE_TIMEOUT: "600"
      CU_WARM_ON_START: "true"
      CU_WARM_TEXT_EMBEDDINGS: ${CU_WARM_TEXT_EMBEDDINGS:-true}
      CU_CLIP_CACHE_DIR: /var/cache/cu-clip
    volumes:
      - cu_clip_cache:/var/cache/cu-clip
      - cu_hf_cache:/root/.cache/huggingface

volumes:
  rabbitmq_data:
  cu_clip_cache:
  cu_hf_cache:
