spring:
  application:
    name: vibely-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:16}
          max-idle: ${REDIS_POOL_MAX_IDLE:8}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
server:
  error:
    include-message: never
logging:
  pattern:
    level: "%5p [req:%X{requestId:-na}]"
app:
  urls:
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
    backend-base-url: ${BACKEND_BASE_URL:http://localhost:8080}
    short-link-base-url: ${SHORT_LINK_BASE_URL:http://localhost:8080}
    deep-link-scheme: ${APP_DEEP_LINK_SCHEME:vibely}
  share:
    short-code-length: ${APP_SHARE_SHORT_CODE_LENGTH:8}
    redirect-cache-ttl-seconds: ${APP_SHARE_REDIRECT_CACHE_TTL_SECONDS:604800}
    idempotency-window-hours: ${APP_SHARE_IDEMPOTENCY_WINDOW_HOURS:24}
    redirect-rate-limit-per-minute: ${APP_SHARE_REDIRECT_RATE_LIMIT:120}
    share-write-rate-limit-per-minute: ${APP_SHARE_SHARE_WRITE_RATE_LIMIT:40}
    share-preview-rate-limit-per-minute: ${APP_SHARE_PREVIEW_RATE_LIMIT:180}
    view-record-rate-limit-per-minute: ${APP_SHARE_VIEW_RATE_LIMIT:120}
    public-share-rate-limit-per-minute: ${APP_SHARE_PUBLIC_SHARE_RATE_LIMIT:60}
    download-rate-limit-per-minute: ${APP_SHARE_DOWNLOAD_RATE_LIMIT:12}
    antibot-rate-limit-per-minute: ${APP_SHARE_ANTIBOT_RATE_LIMIT:40}
    negative-cache-ttl-seconds: ${APP_SHARE_NEGATIVE_CACHE_TTL_SECONDS:60}
  redis:
    enabled: ${APP_REDIS_ENABLED:false}
    key-prefix: ${APP_REDIS_KEY_PREFIX:vibely}
  jwt:
    secret: ${JWT_SECRET:change-this-in-real-environments}
    expiration-seconds: 900
    refresh-expiration-seconds: 1209600
  auth:
    expose-tokens-in-api: ${APP_AUTH_EXPOSE_TOKENS_IN_API:false}
    cookie:
      secure: ${APP_AUTH_COOKIE_SECURE:false}
      same-site: ${APP_AUTH_COOKIE_SAME_SITE:Lax}
      domain: ${APP_AUTH_COOKIE_DOMAIN:}
  mail:
    expose-code-in-api: ${APP_MAIL_EXPOSE_CODE:false}
  s3:
    enabled: ${APP_S3_ENABLED:false}
    bucket: ${AWS_S3_BUCKET:}
    region: ${AWS_REGION:ap-southeast-2}
    access-key-id: ${AWS_ACCESS_KEY_ID:}
    secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
    presign-expiration-minutes: ${APP_S3_PRESIGN_EXPIRATION_MINUTES:15}
    playback-presign-expiry-hours: ${APP_S3_PLAYBACK_PRESIGN_EXPIRY_HOURS:0}
    public-url-base: ${APP_S3_PUBLIC_URL_BASE:}
  processing:
    dry-run-promote-when-worker-disabled: ${APP_PROCESSING_DRY_RUN_PROMOTE:true}
    poll-interval-ms: ${APP_PROCESSING_POLL_INTERVAL_MS:5000}
    ffmpeg-path: ${FFMPEG_PATH:ffmpeg}
    ffprobe-path: ${FFPROBE_PATH:ffprobe}
    max-job-attempts: ${APP_PROCESSING_MAX_JOB_ATTEMPTS:3}
    recovery-stale-processing-minutes: ${APP_PROCESSING_RECOVERY_STALE_MINUTES:30}
    audio:
      enabled: ${APP_PROCESSING_AUDIO_ENABLED:true}
      volume-detect-enabled: ${APP_PROCESSING_AUDIO_VOLUME_DETECT:true}
      integrated-loudness-lufs: ${APP_PROCESSING_AUDIO_LUFS:-12}
      loudness-range: ${APP_PROCESSING_AUDIO_LRA:7}
      true-peak-db: ${APP_PROCESSING_AUDIO_TP:-1}
      bitrate-kbps: ${APP_PROCESSING_AUDIO_BITRATE_KBPS:128}
      sample-rate-hz: ${APP_PROCESSING_AUDIO_SAMPLE_RATE:48000}
    worker:
      enabled: ${APP_PROCESSING_WORKER_ENABLED:false}
  originality:
    enabled: ${APP_ORIGINALITY_ENABLED:true}
    internal-token: ${APP_ORIGINALITY_INTERNAL_TOKEN:vibely-dev-originality-token}
    policy-version: ${APP_ORIGINALITY_POLICY_VERSION:v1}
    max-job-attempts: ${APP_ORIGINALITY_MAX_JOB_ATTEMPTS:5}
    stale-processing-minutes: ${APP_ORIGINALITY_STALE_MINUTES:45}
    recovery:
      enabled: ${APP_ORIGINALITY_RECOVERY_ENABLED:true}
      interval-ms: ${APP_ORIGINALITY_RECOVERY_INTERVAL_MS:60000}
  moderation:
    enabled: ${APP_MODERATION_ENABLED:true}
    apply-decisions: ${APP_MODERATION_APPLY_DECISIONS:false}
    auto-ban-on-block: ${APP_MODERATION_AUTO_BAN_ON_BLOCK:true}
    rabbitmq-enabled: ${APP_MODERATION_RABBITMQ_ENABLED:false}
    internal-token: ${APP_MODERATION_INTERNAL_TOKEN:vibely-dev-moderation-token}
    policy-version: ${APP_MODERATION_POLICY_VERSION:2026.07.1}
    engine-version: ${APP_MODERATION_ENGINE_VERSION:mod-policy-v1}
    max-job-attempts: ${APP_MODERATION_MAX_JOB_ATTEMPTS:5}
    stale-processing-minutes: ${APP_MODERATION_STALE_MINUTES:30}
    originality-soft-timeout-minutes: ${APP_MODERATION_ORIG_SOFT_TIMEOUT_MINUTES:20}
    exchange: ${APP_MODERATION_EXCHANGE:vibely.moderation}
    routing-key-evaluate: ${APP_MODERATION_ROUTING_EVALUATE:moderation.evaluate.requested}
    queue-evaluate: ${APP_MODERATION_QUEUE_EVALUATE:moderation.evaluate}
    outbox-publish-interval-ms: ${APP_MODERATION_OUTBOX_INTERVAL_MS:5000}
    recovery:
      enabled: ${APP_MODERATION_RECOVERY_ENABLED:true}
      interval-ms: ${APP_MODERATION_RECOVERY_INTERVAL_MS:60000}
  content-understanding:
    enabled: ${APP_CU_ENABLED:true}
    rabbitmq-enabled: ${APP_CU_RABBITMQ_ENABLED:false}
    internal-token: ${APP_CU_INTERNAL_TOKEN:vibely-dev-cu-token}
    model-bundle-version: ${APP_CU_MODEL_BUNDLE:cu-bundle-phase1}
    max-job-attempts: ${APP_CU_MAX_JOB_ATTEMPTS:5}
    stale-running-minutes: ${APP_CU_STALE_MINUTES:45}
    exchange: ${APP_CU_EXCHANGE:content.topic}
    routing-key-analyze: ${APP_CU_ROUTING_ANALYZE:cu.analyze.requested}
    queue-analyze: ${APP_CU_QUEUE_ANALYZE:cu.analyze}
    outbox-publish-interval-ms: ${APP_CU_OUTBOX_INTERVAL_MS:5000}
    qdrant-enabled: ${APP_CU_QDRANT_ENABLED:true}
    qdrant-url: ${APP_CU_QDRANT_URL:${QDRANT_URL:http://127.0.0.1:6333}}
    qdrant-video-collection: ${APP_CU_QDRANT_VIDEO_COLLECTION:vibely_cu_video}
    qdrant-top-k: ${APP_CU_QDRANT_TOP_K:32}
    recovery:
      enabled: ${APP_CU_RECOVERY_ENABLED:true}
      interval-ms: ${APP_CU_RECOVERY_INTERVAL_MS:60000}
  discovery:
    enabled: ${DISCOVERY_ENABLED:true}
    open-ai-enabled: ${DISCOVERY_OPENAI_ENABLED:true}
    open-ai-api-key: ${OPENAI_API_KEY:}
    open-ai-base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    understanding-model: ${DISCOVERY_OPENAI_MODEL:gpt-4o-mini}
    embedding-model: ${DISCOVERY_EMBEDDING_MODEL:text-embedding-3-small}
    embedding-dimensions: ${DISCOVERY_EMBEDDING_DIMENSIONS:1536}
    async-indexing: ${DISCOVERY_ASYNC_INDEXING:true}
    hybrid-explore: ${DISCOVERY_HYBRID_EXPLORE:true}
    hybrid-related: ${DISCOVERY_HYBRID_RELATED:true}
    cu-related-enabled: ${DISCOVERY_CU_RELATED_ENABLED:true}
    hybrid-search: ${DISCOVERY_HYBRID_SEARCH:true}
    embedding-similarity-weight: ${DISCOVERY_EMBEDDING_WEIGHT:0.70}
    topic-similarity-weight: ${DISCOVERY_TOPIC_WEIGHT:0.30}
    hashtag-weight-cap: ${DISCOVERY_HASHTAG_WEIGHT_CAP:0.25}
    media-understanding-enabled: ${DISCOVERY_MEDIA_UNDERSTANDING_ENABLED:true}
    whisper-model: ${DISCOVERY_WHISPER_MODEL:whisper-1}
    vision-model: ${DISCOVERY_VISION_MODEL:gpt-4o-mini}
    transcript-max-seconds: ${DISCOVERY_TRANSCRIPT_MAX_SECONDS:60}
    ocr-frame-count: ${DISCOVERY_OCR_FRAME_COUNT:3}
    media-max-bytes: ${DISCOVERY_MEDIA_MAX_BYTES:125829120}
    ranking:
      watch-time: ${DISCOVERY_RANK_WATCH_TIME:0.35}
      completion: ${DISCOVERY_RANK_COMPLETION:0.20}
      share: ${DISCOVERY_RANK_SHARE:0.15}
      save: ${DISCOVERY_RANK_SAVE:0.10}
      comment: ${DISCOVERY_RANK_COMMENT:0.10}
      follow: ${DISCOVERY_RANK_FOLLOW:0.05}
      freshness: ${DISCOVERY_RANK_FRESHNESS:0.05}
  explore:
    ranking-recompute-interval-ms: ${EXPLORE_RANKING_RECOMPUTE_MS:300000}
  search:
    suggest-cache-ttl-seconds: ${SEARCH_SUGGEST_CACHE_TTL_SECONDS:300}
    suggest-group-limit: ${SEARCH_SUGGEST_GROUP_LIMIT:8}
    candidate-multiplier: ${SEARCH_CANDIDATE_MULTIPLIER:4}
  translation:
    enabled: ${APP_TRANSLATION_ENABLED:false}
    base-url: ${APP_TRANSLATION_BASE_URL:http://127.0.0.1:8002}
    internal-token: ${APP_TRANSLATION_INTERNAL_TOKEN:vibely-dev-translation-token}
    redis-ttl-seconds: ${APP_TRANSLATION_REDIS_TTL_SECONDS:604800}
    sync-timeout-ms: ${APP_TRANSLATION_SYNC_TIMEOUT_MS:12000}
    poll-interval-ms: ${APP_TRANSLATION_POLL_INTERVAL_MS:3000}
    max-job-attempts: ${APP_TRANSLATION_MAX_JOB_ATTEMPTS:5}
    worker:
      enabled: ${APP_TRANSLATION_WORKER_ENABLED:true}
---
spring:
  config:
    activate:
      on-profile: dev
app:
  s3:
    enabled: ${APP_S3_ENABLED:true}
  redis:
    enabled: ${APP_REDIS_ENABLED:true}
  processing:
    dry-run-promote-when-worker-disabled: false
    worker:
      enabled: ${APP_PROCESSING_WORKER_ENABLED:true}
  translation:
    enabled: ${APP_TRANSLATION_ENABLED:true}
    base-url: ${APP_TRANSLATION_BASE_URL:http://127.0.0.1:8002}
