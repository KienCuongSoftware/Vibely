spring:
  application:
    name: vibely-backend
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
server:
  error:
    include-message: never
logging:
  pattern:
    level: "%5p [req:%X{requestId:-na}]"
app:
  jwt:
    secret: ${JWT_SECRET:change-this-in-real-environments}
    expiration-seconds: 86400
    refresh-expiration-seconds: 604800
