spring:
  config:
    import: optional:classpath:application-local.yaml
  # Sau khi sửa nội dung migration đã apply (checksum lệch), dev có thể bật lại true rồi chạy: mvn flyway:repair
  flyway:
    validate-on-migrate: false
  datasource:
    url: jdbc:postgresql://localhost:5432/vibely
    username: postgres
    password: ${DB_PASSWORD}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID:${FACEBOOK_APP_ID}}
            client-secret: ${FACEBOOK_CLIENT_SECRET:${FACEBOOK_APP_SECRET}}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - public_profile
              - email
            client-name: Facebook
        provider:
          facebook:
            authorization-uri: https://www.facebook.com/v19.0/dialog/oauth
            token-uri: https://graph.facebook.com/v19.0/oauth/access_token
            user-info-uri: https://graph.facebook.com/v19.0/me?fields=id,name,email,picture.type(large)
            user-name-attribute: id
app:
  # Bật S3 trên profile dev. Luu y: bien moi truong APP_S3_ENABLED uu tien CAO hon YAML — neu APP_S3_ENABLED=false thi S3Client van khong tao du file nay ghi true.
  # application-local.yaml co do uu tien thap hon application.yaml cho cung key voi file goc.
  s3:
    enabled: true
    # Bucket private: trình duyệt cần URL GET đã ký mới phát được video_url trong JSON.
    playback-presign-expiry-hours: ${APP_S3_PLAYBACK_PRESIGN_EXPIRY_HOURS:24}
  # Worker + FFmpeg HLS chỉ chạy khi có bean S3Client (s3.enabled=true ở trên + bucket/credential).
  # File application-local.yaml (optional) có thể ghi đè app.processing — kiểm tra nếu vẫn không có thư mục hls/ trên S3.
  # Windows: neu log loi "Cannot run program ffprobe" / CreateProcess error=2 — JVM khong tim thay ffmpeg trong PATH.
  # Cai FFmpeg, roi dat bien FFMPEG_PATH / FFPROBE_PATH tro toi .exe day du, vi du:
  #   FFMPEG_PATH=C:\ffmpeg\bin\ffmpeg.exe
  #   FFPROBE_PATH=C:\ffmpeg\bin\ffprobe.exe
  # (uploads/ chi co 1 file mp4 goc la dung; HLS nam o prefix hls/{authorId}/{videoId}/)
  processing:
    worker:
      enabled: true
    dry-run-promote-when-worker-disabled: false
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
  oauth2:
    enabled: true
    frontend-success-url: http://localhost:5173/login
    frontend-failure-url: http://localhost:5173/login
