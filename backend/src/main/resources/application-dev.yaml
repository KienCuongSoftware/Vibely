spring:
  config:
    import: optional:classpath:application-local.yaml
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
  # Sau khi sửa nội dung migration đã apply (checksum lệch), dev có thể bật lại true rồi chạy: mvn flyway:repair
  flyway:
    validate-on-migrate: false
  datasource:
    url: jdbc:postgresql://localhost:5432/vibely
    username: postgres
    password: ${DB_PASSWORD}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID:${FACEBOOK_APP_ID}}
            client-secret: ${FACEBOOK_CLIENT_SECRET:${FACEBOOK_APP_SECRET}}
            scope:
              - public_profile
              - email
            client-name: Facebook
          line:
            client-id: ${LINE_CHANNEL_ID}
            client-secret: ${LINE_CHANNEL_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            # Callback URL trên LINE Developers phải khớp (có thể thêm localhost khi dev local).
            redirect-uri: "${OAUTH_PUBLIC_BASE_URL:https://vibely.sbs}/login/oauth2/code/line"
            scope:
              - openid
              - profile
            client-name: LINE
        provider:
          facebook:
            authorization-uri: https://www.facebook.com/v19.0/dialog/oauth
            token-uri: https://graph.facebook.com/v19.0/oauth/access_token
            user-info-uri: https://graph.facebook.com/v19.0/me?fields=id,name,email,picture.type(large)
            user-name-attribute: id
          line:
            authorization-uri: https://access.line.me/oauth2/v2.1/authorize
            token-uri: https://api.line.me/oauth2/v2.1/token
            user-info-uri: https://api.line.me/oauth2/v2.1/userinfo
            issuer-uri: https://access.line.me
            jwk-set-uri: https://api.line.me/oauth2/v2.1/certs
            user-name-attribute: sub
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
app:
  jwt:
    secret: ${JWT_SECRET:change-this-in-real-environments}
    expiration-seconds: 900
    refresh-expiration-seconds: 1209600
  auth:
    otp-resend-seconds: 60
    otp-expiry-seconds: 600
    cookie:
      secure: ${APP_AUTH_COOKIE_SECURE:true}
  mail:
    enabled: ${APP_MAIL_ENABLED:false}
    from: ${APP_MAIL_FROM:${SMTP_USERNAME:}}
    from-name: Vibely
    expose-code-in-api: ${APP_MAIL_EXPOSE_CODE:true}
  antibot:
    enabled: true
    auth-protection-enabled: true
    always-require-captcha-on-auth: false
    hmac-secret: ${ANTIBOT_HMAC_SECRET:vibely-antibot-dev-secret}
    captcha-ttl-seconds: 120
    verification-token-ttl-seconds: 300
    kafka-enabled: false
    max-failed-logins-per-ip-per-hour: 40
    max-failed-logins-per-email-per-hour: 12
    low-failure-threshold: 2
    medium-failure-threshold: 4
    high-failure-threshold: 7
    extreme-failure-threshold: 12
  s3:
    enabled: true
    playback-presign-expiry-hours: ${APP_S3_PLAYBACK_PRESIGN_EXPIRY_HOURS:24}
  processing:
    ffmpeg-path: ${FFMPEG_PATH:C:/FFmpeg/ffmpeg-8.1.1-essentials_build/bin/ffmpeg.exe}
    ffprobe-path: ${FFPROBE_PATH:C:/FFmpeg/ffmpeg-8.1.1-essentials_build/bin/ffprobe.exe}
    worker:
      enabled: true
    dry-run-promote-when-worker-disabled: false
  redis:
    enabled: ${APP_REDIS_ENABLED:false}
  urls:
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  cors:
    allowed-origins: http://localhost:8001,http://127.0.0.1:8001,http://localhost:5173,http://127.0.0.1:5173,http://localhost:3001,http://127.0.0.1:3001,https://vibely.sbs,https://www.vibely.sbs
    # LAN / tunnel dev trên điện thoại — thêm pattern; vẫn cần đăng ký redirect URI trên Google/Facebook console
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://192.168.*:*,http://10.*:*,http://172.*:*,https://vibely.sbs,https://*.vibely.sbs,https://*.trycloudflare.com,https://*.ngrok-free.app,https://*.ngrok.app}
  oauth2:
    enabled: true
    public-base-url: ${OAUTH_PUBLIC_BASE_URL:}
    frontend-success-url: ${FRONTEND_BASE_URL:http://localhost:5173}/login
    frontend-failure-url: ${FRONTEND_BASE_URL:http://localhost:5173}/login
  discovery:
    open-ai-enabled: ${DISCOVERY_OPENAI_ENABLED:true}
    open-ai-api-key: ${OPENAI_API_KEY:sk-...}

# Tin X-Forwarded-* từ nginx/cloudflared để OAuth redirect-uri dùng đúng :8001 / domain công khai
server:
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        secure: ${APP_SESSION_COOKIE_SECURE:true}
        same-site: lax
