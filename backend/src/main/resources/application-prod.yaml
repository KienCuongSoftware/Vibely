spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  jwt:
    secret: ${JWT_SECRET}
  auth:
    cookie:
      secure: true
      same-site: Lax
  mail:
    expose-code-in-api: false
  discovery:
    open-ai-enabled: ${DISCOVERY_OPENAI_ENABLED:true}
    open-ai-api-key: ${OPENAI_API_KEY:}
