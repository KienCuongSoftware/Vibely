spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
  jpa:
    show-sql: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - openid
              - profile
              - email
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID:${FACEBOOK_APP_ID:}}
            client-secret: ${FACEBOOK_CLIENT_SECRET:${FACEBOOK_APP_SECRET:}}
            scope:
              - public_profile
              - email
        provider:
          facebook:
            authorization-uri: https://www.facebook.com/v19.0/dialog/oauth
            token-uri: https://graph.facebook.com/v19.0/oauth/access_token
            user-info-uri: https://graph.facebook.com/v19.0/me?fields=id,name,email,picture.type(large)
            user-name-attribute: id
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  jwt:
    secret: ${JWT_SECRET}
  auth:
    cookie:
      secure: true
      same-site: Lax
  oauth2:
    enabled: ${APP_OAUTH2_ENABLED:true}
    public-base-url: ${OAUTH_PUBLIC_BASE_URL:https://vibely.sbs}
    frontend-success-url: ${FRONTEND_BASE_URL:https://vibely.sbs}/login
    frontend-failure-url: ${FRONTEND_BASE_URL:https://vibely.sbs}/login
  mail:
    expose-code-in-api: false
  discovery:
    open-ai-enabled: ${DISCOVERY_OPENAI_ENABLED:true}
    open-ai-api-key: ${OPENAI_API_KEY:}
