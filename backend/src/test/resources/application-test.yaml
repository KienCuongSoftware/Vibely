spring:
  datasource:
    url: jdbc:h2:mem:vibely;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
app:
  jwt:
    secret: test-secret-key-with-at-least-thirty-two-chars
    expiration-seconds: 3600
  s3:
    enabled: false
  cors:
    allowed-origins: http://localhost:5173
