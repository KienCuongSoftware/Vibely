spring:
  datasource:
    url: jdbc:h2:mem:vibely;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
app:
  jwt:
    secret: test-secret-key-with-at-least-thirty-two-chars
    expiration-seconds: 3600
  auth:
    expose-tokens-in-api: true
  redis:
    enabled: false
  s3:
    enabled: false
  processing:
    dry-run-promote-when-worker-disabled: true
    worker:
      enabled: false
  originality:
    enabled: false
    internal-token: vibely-dev-originality-token
  cors:
    allowed-origins: http://localhost:5173
  discovery:
    enabled: true
    open-ai-enabled: false
    open-ai-api-key:
  antibot:
    enabled: false
